<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <link rel="stylesheet" href="./Css/bootstrap.min.css">
    <link rel="stylesheet" href="./Css/all.min.css">
    <link rel="stylesheet" href="./Css/style.css">
</head>

<body>
    <div class="content">
        <section class="vh-100 login">
            <div class="layer d-flex overflow-hidden align-items-center justify-content-center">
                <div class="container text-white">
                    <div class="row light2">
                        <div class="col-lg-4 m-auto">
                            <div class="info p-5">
                                <form id="adminLoginForm">
                                    <h1 class="text-center mb-4">Admin Login<i class=" ms-3 fa-regular fa-user"></i> </h1>
                                    <div class="mb-3">
                                        <input type="email" class="rounded-pill w-100 " id="email"
                                            aria-describedby="emailHelp" placeholder="Email address"
                                            name="email" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="password" class="rounded-pill w-100" id="password"
                                            placeholder="Password"
                                            name="password" required>
                                    </div>
                                    <div id="errorMsg" class="alert alert-danger d-none"></div>
                                    <button type="submit"
                                        class="btn btn-primary rounded-pill border-0 m-auto mt-3 w-100 fs-5">Signin</button>
                                </form>
                                <div class="light1">
                                    <span class="all" style="--clr:#00ff0a"></span>
                                    <span class="all" style="--clr:#ff0057"></span>
                                    <span class="all" style="--clr:#fffc44"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="./Js/jquery-3.6.3.min.js"></script>
    <script src="./Js/bootstrap.bundle.min.js"></script>
    <script src="./Js/static-main.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            const result = App.loginAdmin(email, password);
            if (result.success) {
                errorMsg.classList.add('d-none');
                window.location.href = 'home.html';
            } else {
                errorMsg.textContent = result.message;
                errorMsg.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
