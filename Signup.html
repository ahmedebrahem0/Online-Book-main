<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="./Css/bootstrap.min.css">
    <link rel="stylesheet" href="./Css/all.min.css">
    <link rel="stylesheet" href="./Css/style.css">
</head>

<body>
    <div class="content">
        <section class="vh-100 login">
            <div class="layer overflow-hidden d-flex align-items-center justify-content-center">
                <div class="container text-white">
                    <div class="row light2">
                        <div class="col-lg-4 m-auto">
                            <div class="info p-5">
                                <form id="signupForm">
                                    <h1 class="text-center mb-4">Signup<i class=" ms-3 fa-regular fa-user"></i> </h1>
                                    <div class="mb-3">
                                        <input type="text" class="rounded-pill w-100 " id="name"
                                            placeholder="Name"
                                            name="name" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="email" class="rounded-pill w-100 " id="email"
                                            placeholder="Email address"
                                            name="email" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="password" class="rounded-pill w-100" id="password"
                                        placeholder="Password"
                                        name="password" required>
                                    </div>
                                    <div class="mb-3">
                                        <input type="tel" class="rounded-pill w-100" id="phone"
                                        placeholder="Phone"
                                        name="phone" required>
                                    </div>
                                    <div id="errorMsg" class="alert alert-danger d-none"></div>
                                    <div id="successMsg" class="alert alert-success d-none"></div>
                                    <button type="submit"
                                        class="btn btn-primary rounded-pill border-0 m-auto mt-3 w-100 fs-5">Sign up</button>
                                    <div class="ms-auto mt-3 d-flex justify-content-end align-items-center me-4">
                                        <a href="login.html" class="sin-up">Login <i class="fa-solid fa-arrow-right me-3"></i></a>
                                    </div>
                                </form>
                                <div class="light_2">
                                    <span class="all" style="--clr:#00ff0a"></span>
                                    <span class="all" style="--clr:#ff0057"></span>
                                    <span class="all" style="--clr:#fffc44"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="./Js/jquery-3.6.3.min.js"></script>
    <script src="./Js/bootstrap.bundle.min.js"></script>
    <script src="./Js/static-main.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            const result = App.signup(name, email, password, phone);
            if (result.success) {
                errorMsg.classList.add('d-none');
                successMsg.textContent = result.message;
                successMsg.classList.remove('d-none');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } else {
                successMsg.classList.add('d-none');
                errorMsg.textContent = result.message;
                errorMsg.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
