<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Sports Book</title>
    <link rel="stylesheet" href="./Css/bootstrap.min.css">
</head>

<body>
<form id="addForm" class="w-75 m-auto">
<div class="container mt-5">
<h2 class="mb-4">Add Sports Book</h2>
<div class="mb-3">
<label class="form-label">Image URL</label>
<input type="text" id="image" name="image" class="form-control" placeholder="./imgs/book.png" required>
</div>
<div class="mb-3">
<label class="form-label">Price</label>
<input type="number" id="price" name="price" class="form-control" placeholder="99" required>
</div>
<button type="submit" class="btn btn-primary">Add Book</button>
<a href="home.html" class="btn btn-secondary ms-2">Cancel</a>
</div>
</form>

    <script src="./Js/jquery-3.6.3.min.js"></script>
    <script src="./Js/bootstrap.bundle.min.js"></script>
    <script src="./Js/static-main.js"></script>
</body>

</html>
